name: Deploy Backend to Google Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest

    env:
      PROJECT_ID: bagibayar
      REGION: asia-southeast2
      REPO: splitbill-repo
      IMAGE: splitbill-backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Ensure Artifact Registry repo exists
        run: |
          gcloud artifacts repositories describe ${{ env.REPO }} \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
          || gcloud artifacts repositories create ${{ env.REPO }} \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --description="SplitBill backend images"

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:latest \
            ./backend

      - name: Push Docker image to Artifact Registry
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:latest

      - name: Generate env.yaml safely
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          python3 - <<'PYEOF'
          import yaml, os

          def strip_quotes(s):
              """Remove surrounding single or double quotes added by .env format."""
              s = s.strip()
              if (s.startswith('"') and s.endswith('"')) or \
                 (s.startswith("'") and s.endswith("'")):
                  s = s[1:-1]
              return s

          data = {
              'DATABASE_URL': strip_quotes(os.environ['DATABASE_URL']),
              'GCP_SA_KEY':   os.environ['GCP_SA_KEY'],
              'JWT_SECRET':   'SplitBillSecret2026',
          }
          with open('env.yaml', 'w') as f:
              yaml.dump(data, f, default_flow_style=False, allow_unicode=True)
          print("env.yaml generated successfully")
          PYEOF

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy splitbill-backend \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --env-vars-file=env.yaml

      - name: Grant public access (fix IAM warning)
        continue-on-error: true
        run: |
          gcloud --quiet beta run services add-iam-policy-binding splitbill-backend \
            --region=${{ env.REGION }} \
            --member=allUsers \
            --role=roles/run.invoker