name: Deploy Backend to Google Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Generate env.yaml safely
        # Pass secrets via env: so GitHub Actions masks them properly and
        # no shell-quoting issues arise from special characters in values.
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          python3 - <<'PYEOF'
          import yaml, os
          data = {
              'DATABASE_URL': os.environ['DATABASE_URL'],
              'GCP_SA_KEY':   os.environ['GCP_SA_KEY'],
              'JWT_SECRET':   'SplitBillSecret2026',
          }
          with open('backend/env.yaml', 'w') as f:
              yaml.dump(data, f, default_flow_style=False, allow_unicode=True)
          print("env.yaml generated successfully")
          PYEOF

      - name: Deploy Backend Service to Cloud Run
        run: |
          gcloud run deploy splitbill-backend \
            --source ./backend \
            --region=asia-southeast2 \
            --platform=managed \
            --allow-unauthenticated \
            --env-vars-file=backend/env.yaml

      - name: Grant public access (fix IAM warning)
        run: |
          gcloud --quiet beta run services add-iam-policy-binding splitbill-backend \
            --region=asia-southeast2 \
            --member=allUsers \
            --role=roles/run.invoker