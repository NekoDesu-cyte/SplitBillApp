name: Deploy Backend to Google Cloud Run

on:
  push:
    branches:
      - main
    # Workflow ini akan terpicu jika ada perubahan di folder backend atau pada file workflow ini sendiri
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Backend Service to Cloud Run
        run: |
          cd backend
          gcloud run deploy splitbill-backend \
            --source . \
            --region=asia-southeast2 \
            --allow-unauthenticated \
            --set-env-vars DATABASE_URL="${{ secrets.DATABASE_URL }}"
